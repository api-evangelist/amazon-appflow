specificationVersion: '0.19'
description: >-
  Amazon AppFlow is a fully managed integration service that enables you to
  securely transfer data between SaaS applications like Salesforce, SAP,
  Zendesk, Slack, and ServiceNow, and AWS services like Amazon S3 and
  Amazon Redshift, in just a few clicks.
