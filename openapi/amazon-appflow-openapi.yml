          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Flow not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /stop-flow:
    post:
      operationId: stopFlow
      summary: Amazon AppFlow Stop Flow
      description: Deactivates the existing flow. For on-demand flows, this operation returns an unsupportedOperationException error message. For schedule and event-triggered flows, this operation 
        deactivates the flow.
      tags:
      - Flows
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StopFlowRequest'
            examples:
              StopFlowRequestExample:
                summary: Default stopFlow request
                x-microcks-default: true
                value:
                  flowName: my-salesforce-to-s3-flow
      responses:
        '200':
          description: Flow stopped successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StopFlowResponse'
              examples:
                StopFlow200Example:
                  summary: Default stopFlow 200 response
                  x-microcks-default: true
                  value:
                    flowArn: arn:aws:appflow:us-east-1:123456789012:flow/my-salesforce-to-s3-flow
                    flowStatus: Suspended
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Flow not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /cancel-flow-executions:
    post:
      operationId: cancelFlowExecutions
      summary: Amazon AppFlow Cancel Flow Executions
      description: Cancels active runs for a flow. You can cancel all of the active runs for a flow, or you can cancel specific runs by providing their IDs.
      tags:
      - Flows
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelFlowExecutionsRequest'
            examples:
              CancelFlowExecutionsRequestExample:
                summary: Default cancelFlowExecutions request
                x-microcks-default: true
                value:
                  flowName: my-salesforce-to-s3-flow
                  executionIds:
                  - exec-500123
      responses:
        '200':
          description: Flow executions cancelled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelFlowExecutionsResponse'
              examples:
                CancelFlowExecutions200Example:
                  summary: Default cancelFlowExecutions 200 response
                  x-microcks-default: true
                  value:
                    invalidExecutions:
                    - exec-invalid-123
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Flow not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /describe-flow-execution-records:
    post:
      operationId: describeFlowExecutionRecords
      summary: Amazon AppFlow Describe Flow Execution Records
      description: Provides details regarding all instances for a given flow, based on the specified filter function, with a limit of 1000 records.
      tags:
      - Flows
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DescribeFlowExecutionRecordsRequest'
            examples:
              DescribeFlowExecutionRecordsRequestExample:
                summary: Default describeFlowExecutionRecords request
                x-microcks-default: true
                value:
                  flowName: my-salesforce-to-s3-flow
                  maxResults: 20
      responses:
        '200':
          description: Flow execution records returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescribeFlowExecutionRecordsResponse'
              examples:
                DescribeFlowExecutionRecords200Example:
                  summary: Default describeFlowExecutionRecords 200 response
                  x-microcks-default: true
                  value:
                    flowExecutions:
                    - executionId: exec-500123
                      executionStatus: Successful
                      startedAt: 1718153645993
                      lastUpdatedAt: 1718153700000
                      executionResult:
                        recordsProcessed: 1500
                        bytesProcessed: 204800
                        bytesWritten: 204800
                    nextToken: ''
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Flow not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
