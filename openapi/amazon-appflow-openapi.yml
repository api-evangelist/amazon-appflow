          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateConnectorProfileResponse'
              examples:
                UpdateConnectorProfile200Example:
                  summary: Default updateConnectorProfile 200 response
                  x-microcks-default: true
                  value:
                    connectorProfileArn: arn:aws:appflow:us-east-1:123456789012:connectorprofile/my-salesforce-profile
        '400':
          description: Validation error
          content:
