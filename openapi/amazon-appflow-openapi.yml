  /describe-connector-profiles:
    post:
      operationId: describeConnectorProfiles
      summary: Amazon AppFlow Describe Connector Profiles
      description: Returns a list of connector-profile details matching the provided connector-profile names and connector-types. Both input lists are optional, and you can use them to filter the 
        result. If no names or connector-types are provided, returns all connector profiles in a paginated form. If there is no match, this operation returns an empty list.
      tags:
      - Connectors
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DescribeConnectorProfilesRequest'
            examples:
              DescribeConnectorProfilesRequestExample:
                summary: Default describeConnectorProfiles request
                x-microcks-default: true
                value:
                  connectorType: Salesforce
                  maxResults: 20
      responses:
        '200':
          description: Connector profiles returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescribeConnectorProfilesResponse'
              examples:
                DescribeConnectorProfiles200Example:
                  summary: Default describeConnectorProfiles 200 response
                  x-microcks-default: true
                  value:
                    connectorProfileDetails:
                    - connectorProfileArn: arn:aws:appflow:us-east-1:123456789012:connectorprofile/my-salesforce-profile
                      connectorProfileName: my-salesforce-profile
                      connectorType: Salesforce
                      connectionMode: Public
                      createdAt: 1718153645993
                      lastUpdatedAt: 1718153645993
                    nextToken: ''
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
