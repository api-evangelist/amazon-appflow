          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /create-connector-profile:
    post:
      operationId: createConnectorProfile
      summary: Amazon AppFlow Create Connector Profile
      description: Creates a new connector profile associated with your AWS account. There is a soft quota of 100 connector profiles per AWS account. If you need more connector profiles than this 
        quota allows, you can submit a request to the Amazon AppFlow team through the Amazon AppFlow support channel.
      tags:
      - Connectors
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConnectorProfileRequest'
            examples:
              CreateConnectorProfileRequestExample:
                summary: Default createConnectorProfile request
                x-microcks-default: true
                value:
                  connectorProfileName: my-salesforce-profile
                  connectorType: Salesforce
                  connectionMode: Public
                  connectorProfileConfig:
                    connectorProfileCredentials:
                      Salesforce:
                        accessToken: eyJhbGciOiJSUzI1NiJ9...
                        refreshToken: 5Aep8614...
                    connectorProfileProperties:
                      Salesforce:
                        instanceUrl: https://myorg.salesforce.com
      responses:
        '200':
          description: Connector profile created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateConnectorProfileResponse'
              examples:
                CreateConnectorProfile200Example:
                  summary: Default createConnectorProfile 200 response
