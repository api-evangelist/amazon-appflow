openapi: 3.1.0
info:
  title: Amazon AppFlow API
  description: >-
    The Amazon AppFlow API enables you to programmatically create and manage
    data flows between SaaS applications and AWS services, configure
    connectors, define flow triggers, and manage data field mappings.
  version: '2020-08-23'
  contact:
    name: AWS Support
    url: https://aws.amazon.com/premiumsupport/
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  x-logo:
    url: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
servers:
  - url: https://appflow.{region}.amazonaws.com
    description: Amazon AppFlow regional endpoint
    variables:
      region:
        default: us-east-1
        description: AWS region
        enum:
          - us-east-1
          - us-east-2
          - us-west-1
          - us-west-2
          - eu-west-1
          - eu-west-2
          - eu-central-1
          - ap-northeast-1
          - ap-southeast-1
          - ap-southeast-2
          - ap-south-1
          - sa-east-1
          - ca-central-1
security:
  - sigv4: []
tags:
  - name: Flows
    description: Operations for creating and managing data flows
  - name: Connectors
    description: Operations for managing connector profiles and configurations
  - name: Execution
    description: Operations for managing flow executions
paths:
  /create-flow:
    post:
      operationId: CreateFlow
      summary: Create a new data flow
      description: Creates a new flow for transferring data between a source and destination.
      tags:
        - Flows
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFlowInput'
      responses:
        '200':
          description: Flow created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateFlowOutput'
        '400':
          description: Invalid request
        '500':
          description: Internal server error
components:
  securitySchemes:
    sigv4:
      type: apiKey
      name: Authorization
      in: header
      description: AWS Signature Version 4
  schemas:
    CreateFlowInput:
      type: object
      required:
        - flowName
        - sourceFlowConfig
        - destinationFlowConfigList
        - tasks
        - triggerConfig
      properties:
        flowName:
          type: string
          description: The name of the flow
        description:
          type: string
        sourceFlowConfig:
          type: object
          description: The source connector configuration
        destinationFlowConfigList:
          type: array
          items:
            type: object
        tasks:
          type: array
          items:
            type: object
        triggerConfig:
          type: object
    CreateFlowOutput:
      type: object
      properties:
        flowArn:
          type: string
        flowStatus:
          type: string
