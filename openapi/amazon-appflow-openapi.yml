components:
  securitySchemes:
    sigv4:
      type: apiKey
      name: Authorization
      in: header
      description: AWS Signature Version 4 authentication
  schemas:
    CreateFlowRequest:
      type: object
      required:
      - flowName
      - triggerConfig
      - sourceFlowConfig
      - destinationFlowConfigList
      - tasks
      properties:
        flowName:
          type: string
          description: The specified name of the flow. Spaces are not allowed. Use underscores or hyphens only.
          maxLength: 256
          pattern: '[a-zA-Z0-9][\w!@#.-]+'
          example: my-salesforce-to-s3-flow
        clientToken:
          type: string
          description: Idempotency token to ensure CreateFlow completes only once.
          minLength: 1
          maxLength: 256
          example: client-token-500123
        description:
          type: string
          description: A description of the flow you want to create.
          maxLength: 2048
          example: Transfer Salesforce accounts to S3 daily
        kmsArn:
          type: string
          description: The ARN of the KMS key for encryption.
          minLength: 20
          maxLength: 2048
          example: arn:aws:kms:us-east-1:123456789012:key/mrk-1234abcd
        metadataCatalogConfig:
          $ref: '#/components/schemas/MetadataCatalogConfig'
        triggerConfig:
          $ref: '#/components/schemas/TriggerConfig'
        sourceFlowConfig:
          $ref: '#/components/schemas/SourceFlowConfig'
        destinationFlowConfigList:
          type: array
          description: The configuration that controls how Amazon AppFlow places data in the destination connector.
          items:
            $ref: '#/components/schemas/DestinationFlowConfig'
        tasks:
          type: array
          description: A list of tasks that Amazon AppFlow performs while transferring data in the flow run.
          items:
            $ref: '#/components/schemas/Task'
        tags:
          type: object
          description: The tags used to organize, track, or control access for your flow.
          additionalProperties:
            type: string
          example:
            environment: production
    CreateFlowResponse:
      type: object
      properties:
        flowArn:
          type: string
          description: The flow's Amazon Resource Name (ARN).
          maxLength: 512
          example: arn:aws:appflow:us-east-1:123456789012:flow/my-salesforce-to-s3-flow
        flowStatus:
          type: string
          description: Indicates the current status of the flow.
          enum:
          - Active
          - Deprecated
          - Deleted
          - Draft
          - Errored
          - Suspended
          example: Active
    DeleteFlowRequest:
      type: object
      required:
      - flowName
      properties:
        flowName:
          type: string
          description: The specified name of the flow.
          maxLength: 256
          example: my-salesforce-to-s3-flow
        forceDelete:
          type: boolean
          description: Indicates whether Amazon AppFlow should delete the flow, even if it is currently in use.
          example: false
    DescribeFlowRequest:
      type: object
      required:
      - flowName
      properties:
        flowName:
          type: string
          description: The specified name of the flow.
          maxLength: 256
          example: my-salesforce-to-s3-flow
    DescribeFlowResponse:
      type: object
      properties:
        flowArn:
          type: string
          description: The flow's Amazon Resource Name (ARN).
          example: arn:aws:appflow:us-east-1:123456789012:flow/my-salesforce-to-s3-flow
        description:
          type: string
          description: A description of the flow.
          example: Transfer Salesforce accounts to S3 daily
        flowName:
          type: string
          description: The specified name of the flow.
          example: my-salesforce-to-s3-flow
        kmsArn:
          type: string
          description: The ARN of the AWS KMS key.
          example: arn:aws:kms:us-east-1:123456789012:key/mrk-1234abcd
        flowStatus:
          type: string
          description: Indicates the current status of the flow.
          enum:
          - Active
          - Deprecated
          - Deleted
          - Draft
          - Errored
          - Suspended
          example: Active
        flowStatusMessage:
          type: string
          description: Contains an error message if the flow status is in a suspended or error state.
